worker_processes auto;
rtmp_auto_push on;
events {
    worker_connections 1024;
}

# --- RTMP CONFIGURATION (Ingestion Server) ---
rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        # Live streaming application
        application live {
            live on;
            
            # Enable HLS compiling
            hls on;
            hls_nested on;
            hls_path /app/storage/live;
            hls_fragment 3s;
            hls_playlist_length 60s;
            
            # Prevent users from overwriting existing files
            hls_cleanup on;

            # Webhook callbacks to local Nginx HTTP proxy (which adds X-Real-IP: 127.0.0.1)
            on_publish http://127.0.0.1/ingest/on-publish;
            on_publish_done http://127.0.0.1/ingest/on-publish-done;
        }
    }
}

# --- HTTP CONFIGURATION (Reverse Proxy & Static Files) ---
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ── Upstream: Go Main API ──
    upstream main_api {
        server main-api:3000;
    }

    # ── Upstream: NestJS Chat Service ──
    upstream chat_service {
        server chat-service:3001;
    }

    # ── Upstream: Go Analytics Service ──
    upstream analytics_service {
        server analytics-service:3003;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ── Global CORS Configuration for API Endpoints ──
        # Handle CORS preflight requests at Nginx layer to prevent downstream preflight issues
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://main_api;

            # Core headers for Real IP passing
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / SSE connection upgrading
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Analytics Service routes ──
        location /api/analytics/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
                return 204;
            }

            proxy_pass http://analytics_service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Chat Service routes ──
        # Proxy chat endpoints to the NestJS Chat Service
        location /api/rooms/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
                return 204;
            }

            # Match chat-specific paths and proxy to chat service
            # This uses a nested location for /chat
            location ~ ^/api/rooms/(\d+)/chat(/.*)?$ {
                proxy_pass http://chat_service;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # SSE / WebSocket support
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                # Long timeouts for SSE connections
                proxy_connect_timeout 60s;
                proxy_send_timeout 3600s;
                proxy_read_timeout 3600s;

                # Disable buffering for SSE
                proxy_buffering off;
                proxy_cache off;
            }

            # All other /api/rooms/* go to Main API
            proxy_pass http://main_api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Blazing-fast static serving of live HLS files and uploads with CORS enabled
        location /storage/ {
            alias /app/storage/;
            
            # Explicitly force correct MIME types for HLS streams
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
                image/jpeg jpg jpeg;
                image/png png;
            }
            
            # CORS headers required for HLS video player clients
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers '*';
            
            # Disable caching for HLS manifests (.m3u8) so players fetch latest chunks
            if ($request_filename ~* \.(m3u8)$) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                add_header Access-Control-Allow-Headers '*';
                add_header Cache-Control no-cache;
            }
            
            expires 1d;
        }
    }
}
