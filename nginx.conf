daemon off;
worker_processes auto;
rtmp_auto_push on;
events {
    worker_connections 1024;
}

# --- RTMP CONFIGURATION (Ingestion Server) ---
rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        # 1. Source ingestion application from OBS
        application src {
            live on;
            
            # Authenticate stream key via main-api webhook
            on_publish http://127.0.0.1/ingest/on-publish;
            on_publish_done http://127.0.0.1/ingest/on-publish-done;

            # Transcode source stream to 720p, 480p, and 360p variants
            exec_push ffmpeg -i rtmp://localhost:1935/src/$name
              -c:v libx264 -c:a copy -preset superfast -b:v 2000k -g 60 -s 1280x720 -f flv rtmp://localhost:1935/live/${name}_720
              -c:v libx264 -c:a copy -preset superfast -b:v 1000k -g 60 -s 854x480 -f flv rtmp://localhost:1935/live/${name}_480
              -c:v libx264 -c:a copy -preset superfast -b:v 500k -g 60 -s 640x360 -f flv rtmp://localhost:1935/live/${name}_360;
        }

        # 2. HLS packaging application receiving transcoded streams
        application live {
            live on;
            
            # Only allow transcoding processes from localhost to publish here
            allow publish 127.0.0.1;
            deny publish all;
            
            # Enable HLS compiling
            hls on;
            hls_nested on;
            hls_path /app/storage/live;
            hls_fragment 3s;
            hls_playlist_length 60s;
            hls_cleanup on;

            # Define HLS variant playlists for automatically generated Master Playlist
            hls_variant _720 BANDWIDTH=2000000 RESOLUTION=1280x720;
            hls_variant _480 BANDWIDTH=1000000 RESOLUTION=854x480;
            hls_variant _360 BANDWIDTH=500000 RESOLUTION=640x360;
        }
    }
}

# --- HTTP CONFIGURATION (Reverse Proxy & Static Files) ---
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ── Upstream: Go Main API ──
    upstream main_api {
        server main-api:3000;
    }

    # ── Upstream: NestJS Chat Service ──
    upstream chat_service {
        server chat-service:3001;
    }

    # ── Upstream: Go Analytics Service ──
    upstream analytics_service {
        server analytics-service:3003;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ── Global CORS Configuration for API Endpoints ──
        # Nginx will echo the request Origin and allow credentials. Upstreams
        # should not also set Access-Control-* headers (we hide them below).
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Ensure upstream CORS headers do not leak through
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            proxy_pass http://main_api;

            # Core headers for Real IP passing
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / SSE connection upgrading
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Analytics Service routes ──
        location /api/analytics/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
                return 204;
            }

            # Hide any CORS headers from upstream and let Nginx set them
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            proxy_pass http://analytics_service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Chat Service routes ──
        # Proxy chat endpoints to the NestJS Chat Service
        location /api/rooms {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
                return 204;
            }

            # Match chat-specific paths and proxy to chat service
            # This uses a nested location for /chat
            location ~ ^/api/rooms/(\d+)/chat(/.*)?$ {
                proxy_pass http://chat_service;

                # Hide upstream CORS headers for SSE/WebSocket endpoints
                proxy_hide_header Access-Control-Allow-Origin;
                proxy_hide_header Access-Control-Allow-Methods;
                proxy_hide_header Access-Control-Allow-Headers;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # SSE / WebSocket support
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                # Long timeouts for SSE connections
                proxy_connect_timeout 60s;
                proxy_send_timeout 3600s;
                proxy_read_timeout 3600s;

                # Disable buffering for SSE
                proxy_buffering off;
                proxy_cache off;
            }

            # All other /api/rooms/* go to Main API
            # Hide upstream CORS headers when proxying to main API
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            proxy_pass http://main_api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Blazing-fast static serving of live HLS files and uploads with CORS enabled
        location /storage/ {
            alias /app/storage/;
            
            # Explicitly force correct MIME types for HLS streams
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
                image/jpeg jpg jpeg;
                image/png png;
            }
            
            # CORS headers required for HLS video player clients
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers '*';
            
            # Disable caching for HLS manifests (.m3u8) so players fetch latest chunks
            if ($request_filename ~* \.(m3u8)$) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                add_header Access-Control-Allow-Headers '*';
                add_header Cache-Control no-cache;
            }
            
            expires 1d;
        }
    }
}
